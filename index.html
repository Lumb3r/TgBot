<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TgBot Mini App</title>
    <script src="https://telegram.org"></script>
    <style>
        /* Базовые настройки адаптивного экрана */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f7);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Карточка профиля пользователя */
        .user-card {
            background-color: var(--tg-theme-bg-color, #ffffff);
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            text-align: left;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

            .user-card h2 {
                margin: 0 0 4px 0;
                font-size: 20px;
            }

            .user-card p {
                margin: 0;
                font-size: 14px;
                color: var(--tg-theme-hint-color, #8e8e93);
            }

        /* Контейнер для основного функционала */
        .main-container {
            background-color: var(--tg-theme-bg-color, #ffffff);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Стили полей ввода */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

            .input-group label {
                display: block;
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 8px;
                color: var(--tg-theme-text-color, #000000);
            }

        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

            .input-field:focus {
                border-color: var(--tg-theme-button-color, #2481cc);
            }

        /* Кнопки в стиле Telegram */
        .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.15s ease-in-out;
        }

            .btn-primary:active {
                opacity: 0.85;
            }

        .btn-secondary {
            background-color: transparent;
            color: var(--tg-theme-button-color, #2481cc);
            border: none;
            margin-top: 12px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Блок профиля -->
    <div class="user-card">
        <h2>Привет, <span id="username">Пользователь</span>! 👋</h2>
        <p id="user-status">WebApp успешно синхронизирован</p>
    </div>

    <!-- Основной рабочий блок -->
    <div class="main-container">
        <div>
            <!-- Пример интерактивного поля ввода -->
            <div class="input-group">
                <label for="date-select">Выберите важную дату:</label>
                <input type="date" id="date-select" class="input-field">
            </div>

            <p style="text-align: left; font-size: 14px;">Вы можете настроить отправку этой даты обратно в вашего C# бота.</p>
        </div>

        <div>
            <button class="btn-primary" onclick="sendDataToBot()">Отправить в бот 🚀</button>
            <button class="btn-secondary" onclick="closeApp()">Закрыть</button>
        </div>
    </div>

    <script>// @ts-ignore
        const tg = window.Telegram?.WebApp;

        if (tg) {
            tg.expand(); // Разворот на максимум
            tg.ready();  // Сообщаем Telegram, что интерфейс загружен

            // Отображаем имя пользователя
            if (tg.initDataUnsafe?.user) {
                const usernameElement = document.getElementById('username');
                if (usernameElement) {
                    usernameElement.innerText = tg.initDataUnsafe.user.first_name;
                }
            }
        }

        // Функция отправки данных обратно в чат с C# ботом
function sendDataToBot() {
    const dateInput = document.getElementById('date-select');

    // @ts-ignore
    if (dateInput && dateInput.value) {
        // Берем дату как она есть (в формате ГГГГ-ММ-ДД)
        // @ts-ignore
        const rawDate = dateInput.value;

        // Преобразуем из ГГГГ-ММ-ДД в ДД.ММ.ГГГГ
        const parts = rawDate.split('-');
        const formattedDate = `${parts[2]}.${parts[1]}.${parts[0]}`;

        if (tg) {
            // Отправляем команду напрямую в C# хендлер
            tg.sendData(`/дата ${formattedDate}`);
        }
    } else {
        alert("Пожалуйста, сначала выберите дату!");
    }
}
        

        function closeApp() {
            if (tg) tg.close();
        }</script>
</body>
</html>
