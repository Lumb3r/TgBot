<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TgBot Mini App</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f7);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .user-card {
            background-color: var(--tg-theme-bg-color, #ffffff);
            border-radius: 12px;
            padding: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            text-align: left;
            margin-bottom: 16px;
            box-sizing: border-box;
        }

            .user-card h2 {
                margin: 0 0 4px 0;
                font-size: 20px;
            }

            .user-card p {
                margin: 0;
                font-size: 14px;
                color: var(--tg-theme-hint-color, #8e8e93);
            }

        .main-container {
            background-color: var(--tg-theme-bg-color, #ffffff);
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

            .input-group label {
                display: block;
                font-size: 14px;
                font-weight: 600;
                margin-bottom: 8px;
            }

        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--tg-theme-button-color, #2481cc);
            border: none;
            margin-top: 12px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="user-card">
        <h2>Привет, <span id="username">Пользователь</span>! 👋</h2>
        <p>WebApp успешно синхронизирован</p>
    </div>

    <div class="main-container">
        <div>
            <div class="input-group">
                <label for="date-select">Выберите важную дату:</label>
                <input type="date" id="date-select" class="input-field">
            </div>
            <p style="text-align: left; font-size: 14px; color: var(--tg-theme-hint-color, #8e8e93);">
                Выберите день на календаре выше и нажмите синюю кнопку, чтобы отправить её боту.
            </p>
        </div>

        <div>
            <button class="btn-primary" onclick="sendDataToBot()">Отправить в бот 🚀</button>
            <button class="btn-secondary" onclick="closeApp()">Закрыть</button>
        </div>
    </div>

    <script>// @ts-ignore
        const tg = window.Telegram?.WebApp;

        if (tg) {
            tg.expand();
            tg.ready();

            if (tg.initDataUnsafe?.user) {
                const usernameElement = document.getElementById('username');
                if (usernameElement) {
                    usernameElement.innerText = tg.initDataUnsafe.user.first_name;
                }
            }
        }

        function sendDataToBot() {
            const dateInput = document.getElementById('date-select');

            // @ts-ignore
            if (dateInput && dateInput.value) {
                // @ts-ignore
                const rawDate = dateInput.value; // Получаем значение в формате ГГГГ-ММ-ДД
                const parts = rawDate.split('-');

                // ИСПРАВЛЕНИЕ: Правильно собираем дату по индексам массива [день].[месяц].[год]
                const formattedDate = `${parts[2]}.${parts[1]}.${parts[0]}`;

                if (tg) {
                    // Передаем команду в чат бота
                    tg.sendData(`/дата ${formattedDate}`);
                }
            } else {
                alert("Пожалуйста, сначала выберите дату на календаре!");
            }
        }

        function closeApp() {
            if (tg) tg.close();
        }</script>
</body>
</html>
